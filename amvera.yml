---
meta:
  environment: nodejs
  toolchain:
    name: npm
    version: 20
build:
  skip: false
  additionalCommands:  cd backend
    - npm install
    - cd ../frontend
    - npm install
    - npm run build
    - cd ../backend
  artifacts:
    '*': /
run:
  persistenceMount: /data
  scriptName: stsrt
  scriptArguments: null
  nodeArguments: null
  command: npm run start
  containerPort: 80
  servicePort: 80
