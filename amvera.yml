---
meta:
  environment: nodejs
  toolchain:
    name: npm
    version: 20
build:
  skip: false
  additionalCommands:   
    - cd backend
    - npm install
    - npm install -g typescript
    - tscnpm run build
  artifacts:
    '*': /
run:
  persistenceMount: /data
  scriptName: stsrt
  scriptArguments: null
  nodeArguments: null
  command: npm run start
  containerPort: 80
  servicePort: 80
